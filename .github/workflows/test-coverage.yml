# Unit Test Coverage Report

name: 🧪 Test Coverage

on:
  push:
    branches: [main]
    paths:
      - 'src/**' # 仅当 src 目录下的文件变化时触发
      - 'test/**' # 仅当 test 目录下的文件变化时触发
  pull_request:
    branches: [main]
    paths:
      - 'src/**' # 仅当 src 目录下的文件变化时触发
      - 'test/**' # 仅当 test 目录下的文件变化时触发

jobs:
  build:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Use Node.js 16
        uses: actions/setup-node@v3
        with:
          node-version: 16
          cache: 'npm'

      - name: Install deps
        run: npm ci

      # - name: Build
      #   run: npm run build --if-present

      - name: Test
        run: npm test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
